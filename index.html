<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>坦克大战</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            overflow: hidden;
        }
        .game-container {
            display: flex;
            gap: 20px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }
        canvas {
            border: 3px solid #4a4a6a;
            border-radius: 5px;
            background: #000;
        }
        .side-panel {
            width: 220px;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 15px;
            text-align: center;
            text-shadow: 0 0 10px #ff6b6b;
        }
        .stat-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .stat-label {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 5px;
        }
        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: #4ecdc4;
        }
        .controls-info {
            margin-top: 20px;
            font-size: 11px;
            color: #888;
            line-height: 1.6;
        }
        .key {
            display: inline-block;
            background: #333;
            padding: 2px 6px;
            border-radius: 3px;
            margin: 0 2px;
            border: 1px solid #555;
        }
        .btn {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: linear-gradient(45deg, #f093fb, #f5576c);
            color: white;
        }
        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(245, 87, 108, 0.4);
        }
        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            z-index: 1000;
        }
        .game-over h2 {
            font-size: 48px;
            color: #ff6b6b;
            text-shadow: 0 0 20px #ff6b6b;
        }
        .game-over p {
            font-size: 24px;
        }
        .health-bar {
            width: 100%;
            height: 10px;
            background: #333;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 5px;
        }
        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #f5576c, #f093fb);
            transition: width 0.3s;
        }
        .score-bar {
            width: 100%;
            height: 10px;
            background: #333;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 5px;
        }
        .score-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ecdc4, #44a08d);
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="side-panel">
            <h1>坦克大战</h1>
            <div class="stat-box">
                <div class="stat-label">生命值</div>
                <div class="stat-value" id="healthText">100%</div>
                <div class="health-bar"><div class="health-fill" id="healthFill" style="width: 100%"></div></div>
            </div>
            <div class="stat-box">
                <div class="stat-label">得分</div>
                <div class="stat-value" id="scoreText">0</div>
                <div class="score-bar"><div class="score-fill" id="scoreFill" style="width: 0%"></div></div>
            </div>
            <div class="stat-box">
                <div class="stat-label">等级</div>
                <div class="stat-value" id="levelText">1</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">击杀</div>
                <div class="stat-value" id="killsText">0</div>
            </div>
            <button class="btn btn-primary" id="startBtn">开始游戏</button>
            <button class="btn btn-secondary" id="resetBtn">重置游戏</button>
            <div class="controls-info">
                <strong>操作说明：</strong><br>
                W 向上，S 向下，A 向左，D 向右<br>
                空格 发射，P 暂停，R 重生
            </div>
        </div>
    </div>
    <div class="game-over" id="gameOverScreen">
        <h2>游戏结束</h2>
        <p>最终得分：<span id="finalScore" style="color: #4ecdc4; font-size: 32px;"></span></p>
        <button class="btn btn-primary" id="restartBtn">重新开始</button>
    </div>

    <script>
        (function() {
            var canvas, ctx, gameState, player, gameLoopId;
            var TANK_SIZE = 30, BULLET_SIZE = 5;

            // 初始化
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');

            // 游戏状态
            var running = false;
            var score = 0;
            var health = 100;
            var level = 1;
            var kills = 0;
            var frame = 0;

            // 初始化绘制黑色背景
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            console.log('游戏页面加载完成！');

            // 坦克类
            function createTank(x, y, color, isPlayer) {
                return {
                    x: x,
                    y: y,
                    width: TANK_SIZE,
                    height: TANK_SIZE,
                    color: color,
                    isPlayer: isPlayer,
                    speed: isPlayer ? 3 : 2,
                    angle: -Math.PI / 2,
                    health: isPlayer ? 100 : 3,
                    maxHealth: isPlayer ? 100 : 3,
                    dead: false,
                    shootCooldown: 0,
                    maxCooldown: isPlayer ? 15 : 25,

                    update: function() {
                        if (this.shootCooldown > 0) this.shootCooldown--;
                        this.x = Math.max(0, Math.min(canvas.width - this.width, this.x));
                        this.y = Math.max(0, Math.min(canvas.height - this.height, this.y));
                    },

                    draw: function() {
                        ctx.save();
                        ctx.translate(this.x + this.width / 2, this.y + this.height / 2);
                        ctx.rotate(this.angle);
                        ctx.fillStyle = this.color;
                        ctx.fillRect(-this.width / 2, -this.height / 2, this.width, this.height);
                        ctx.fillStyle = '#2d2d2d';
                        ctx.fillRect(-this.width / 2 - 3, -this.height / 2, 3, this.height);
                        ctx.fillRect(this.width / 2, -this.height / 2, 3, this.height);
                        ctx.fillStyle = this.isPlayer ? '#4ecdc4' : '#e74c3c';
                        ctx.beginPath();
                        ctx.arc(0, -5, this.width / 4, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#444';
                        ctx.fillRect(-2, -this.height / 2 - 5, 4, 10);
                        if (this.isPlayer) {
                            ctx.fillStyle = '#4ecdc4';
                            ctx.beginPath();
                            ctx.moveTo(0, -this.width / 4);
                            ctx.lineTo(-5, this.width / 4);
                            ctx.lineTo(5, this.width / 4);
                            ctx.fill();
                        }
                        ctx.restore();
                        if (this.health < this.maxHealth) {
                            ctx.fillStyle = 'red';
                            ctx.fillRect(this.x, this.y - 10, this.width, 5);
                            ctx.fillStyle = '#4ecdc4';
                            ctx.fillRect(this.x, this.y - 10, this.width * this.health / this.maxHealth, 5);
                        }
                    },

                    move: function(dx, dy, angle) {
                        if (angle) this.angle = angle;
                        else this.x += dx * this.speed;
                        this.y += dy * this.speed;
                    },

                    shoot: function() {
                        if (this.shootCooldown <= 0 && !this.dead) {
                            gameState.bullets.push({
                                x: this.x + this.width / 2,
                                y: this.y + this.height / 2,
                                angle: this.angle,
                                speed: 7,
                                isPlayer: this.isPlayer,
                                vx: Math.cos(this.angle) * this.speed,
                                vy: Math.sin(this.angle) * this.speed,
                                dead: false
                            });
                            this.shootCooldown = this.maxCooldown;
                        }
                    }
                };
            }

            // 创建玩家坦克
            player = createTank(100, 500, '#4ecdc4', true);
            player.angle = 0;

            // 游戏数组
            var bullets = [];
            var enemies = [];
            var particles = [];
            var walls = [];

            // 生成地图
            function generateMap() {
                walls = [];
                for (var i = 0; i < 15; i++) {
                    walls.push({
                        x: Math.random() * (canvas.width - 200),
                        y: Math.random() * (canvas.height - 100),
                        width: 60 + Math.random() * 40,
                        height: 60 + Math.random() * 40
                    });
                }
            }

            // 生成敌人
            function spawnEnemy() {
                var positions = [
                    {x: canvas.width / 2, y: -50},
                    {x: Math.random() * 100, y: -50},
                    {x: canvas.width - 100, y: -50}
                ];
                var pos = positions[Math.floor(Math.random() * positions.length)];
                var enemy = createTank(pos.x, pos.y, '#e74c3c', false);
                enemy.angle = Math.random() < 0.5 ? 0 : Math.PI;
                enemies.push(enemy);
            }

            // 子弹更新和绘制
            function updateBullets() {
                for (var i = 0; i < bullets.length; i++) {
                    var b = bullets[i];
                    b.x += b.vx;
                    b.y += b.vy;
                    if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) b.dead = true;
                    ctx.fillStyle = b.isPlayer ? '#ffff00' : '#ff4444';
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, BULLET_SIZE, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // 敌人 AI
            function updateEnemies() {
                for (var i = 0; i < enemies.length; i++) {
                    var e = enemies[i];
                    var dx = player.x - e.x;
                    var dy = player.y - e.y;
                    var dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist > 100) e.move((dx / dist) * 0.5, (dy / dist) * 0.5);
                    if (Math.random() < 0.01) e.shoot();
                }
            }

            // 碰撞检测
            function checkCollisions() {
                for (var i = 0; i < bullets.length; i++) {
                    var b = bullets[i];
                    if (b.dead) continue;
                    if (b.isPlayer) {
                        for (var j = 0; j < enemies.length; j++) {
                            var e = enemies[j];
                            if (!e.dead && b.x > e.x && b.x < e.x + e.width &&
                                b.y > e.y && b.y < e.y + e.height) {
                                e.health -= 1;
                                if (e.health <= 0) {
                                    e.dead = true;
                                    score += 10;
                                    kills++;
                                    level = Math.floor(score / 100) + 1;
                                }
                                b.dead = true;
                                break;
                            }
                        }
                    } else {
                        if (b.x > player.x && b.x < player.x + player.width &&
                            b.y > player.y && b.y < player.y + player.height) {
                            player.health -= 1;
                            if (player.health <= 0) gameOver();
                            b.dead = true;
                        }
                    }
                }
                bullets = bullets.filter(function(b) { return !b.dead; });
                enemies = enemies.filter(function(e) { return !e.dead; });
            }

            // 绘制墙壁
            function drawWalls() {
                ctx.fillStyle = '#555';
                for (var i = 0; i < walls.length; i++) {
                    var w = walls[i];
                    ctx.fillRect(w.x, w.y, w.width, w.height);
                }
            }

            // 更新 UI
            function updateUI() {
                document.getElementById('healthText').textContent = Math.ceil(player.health) + '%';
                document.getElementById('healthFill').style.width = player.health + '%';
                document.getElementById('scoreText').textContent = score;
                document.getElementById('scoreFill').style.width = Math.min(score / 1000 * 100, 100) + '%';
                document.getElementById('levelText').textContent = level;
                document.getElementById('killsText').textContent = kills;
            }

            // 游戏主循环
            function gameLoop() {
                if (!running || gameState.paused) return;

                frame++;
                player.update();
                player.draw();

                drawWalls();
                updateEnemies();
                enemies.forEach(function(e) { e.update(); e.draw(); });
                updateBullets();
                checkCollisions();
                updateUI();

                // 随机生成敌人
                if (frame % 60 === 0) spawnEnemy();

                gameLoopId = requestAnimationFrame(gameLoop);
            }

            // 开始游戏
            function startGame() {
                running = true;
                score = 0;
                health = 100;
                level = 1;
                kills = 0;
                frame = 0;
                bullets = [];
                enemies = [];
                particles = [];
                generateMap();
                player.health = 100;
                player.dead = false;
                document.getElementById('gameOverScreen').style.display = 'none';
                console.log('游戏已启动！');
                updateUI();
                gameLoop();
            }

            // 游戏结束
            function gameOver() {
                running = false;
                document.getElementById('finalScore').textContent = score;
                document.getElementById('gameOverScreen').style.display = 'flex';
            }

            // 重置游戏
            function resetGame() {
                if (gameLoopId) cancelAnimationFrame(gameLoopId);
                startGame();
            }

            // 键盘事件
            var keys = {};
            document.addEventListener('keydown', function(e) {
                if (!player || !running) return;
                if (e.code === 'KeyW') player.move(0, -1);
                else if (e.code === 'KeyS') player.move(0, 1);
                else if (e.code === 'KeyA') player.move(-1, 0);
                else if (e.code === 'KeyD') player.move(1, 0);
                else if (e.code === 'ArrowUp') player.move(0, 0, Math.PI * 0.5);
                else if (e.code === 'ArrowDown') player.move(0, 0, -Math.PI * 0.5);
                else if (e.code === 'Space') player.shoot();
                else if (e.code === 'KeyP') gameState.paused = !gameState.paused;
                else if (e.code === 'KeyR') resetGame();
            });

            // 绑定按钮事件
            document.getElementById('startBtn').addEventListener('click', startGame);
            document.getElementById('resetBtn').addEventListener('click', resetGame);
            document.getElementById('restartBtn').addEventListener('click', resetGame);

            console.log('游戏初始化完成，点击"开始游戏"按钮开始！');
        })();
    </script>
</body>
</html>
