<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>坦克大战</title>
<style>
body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#1a1a2e;color:#fff;font-family:Arial}
#game{display:flex;gap:20px;background:rgba(0,0,0,0.5);padding:20px;border-radius:15px}
#canvas{border:3px solid #4a4a6a;border-radius:5px;background:#000}
#panel{width:200px;background:rgba(255,255,255,0.1);padding:20px;border-radius:10px}
#score{font-size:20px;color:#4ecdc4;text-align:center;margin:10px 0}
#health{display:flex;justify-content:space-between;align-items:center}
#bar{width:100%;height:10px;background:#333;border-radius:5px;overflow:hidden;margin-top:5px}
#fill{height:100%;background:#4ecdc4;transition:width 0.2s;width:100%}
#btn{width:100%;padding:15px;margin:10px 0;border:none;border-radius:5px;font-size:16px;font-weight:bold;cursor:pointer;background:linear-gradient(45deg,#11998e,#38ef7d);color:#fff}
#info{font-size:12px;color:#aaa;margin-top:20px;line-height:1.8}
</style>
</head>
<body>
<div id="game">
<canvas id="canvas" width="800" height="500"></canvas>
<div id="panel">
<h2>坦克大战</h2>
<div id="score">得分：0</div>
<div id="health"><span>生命值</span><div id="bar"><div id="fill"></div></div></div>
<button id="btn" onclick="start()">开始游戏</button>
<div id="info">W/A/S/D 移动<br>空格射击<br>↑/↓转向<br>↑/↓生成墙壁</div>
</div>
</div>
<script>
var canvas=document.getElementById('canvas');
var ctx=canvas.getContext('2d');
var width=800,height=500;
var running=false,score=0,playerHP=100;
var player={x:100,y:450,angle:0,speed:2.5};
var walls=[],boxes=[];
var bullets=[],enemies=[];
var lastShot=0;
var canShoot=true;
var keyDown={};
var enemySpeed=0.5;
var enemyCount=0;
var maxEnemies=5;

function createWall(x,y,width,height){
    walls.push({x:x,y:y,width:width,height:height,health:3});
}
function createBox(x,y,width,height){
    boxes.push({x:x,y:y,width:width,height:height,health:1});
}

function generateMap(){
    walls=[];
    boxes=[];
    // 生成随机墙壁
    for(var i=0;i<10;i++){
        walls.push({
            x:Math.random()*(width-100),
            y:Math.random()*(height-100),
            width:80+Math.random()*40,
            height:80+Math.random()*40,
            health:3
        });
    }
    // 生成箱子
    for(var i=0;i<5;i++){
        boxes.push({
            x:Math.random()*(width-80),
            y:Math.random()*(height-80),
            width:60,
            height:60,
            health:1
        });
    }
}

function drawWall(w){
    ctx.fillStyle=w.health>1?'#8b7355':'#654321';
    ctx.fillRect(w.x,w.y,w.width,w.height);
    // 墙壁纹理
    ctx.strokeStyle='#553a24';
    ctx.lineWidth=2;
    ctx.strokeRect(w.x+5,w.y+5,w.width-10,w.height-10);
}

function drawBox(b){
    ctx.fillStyle='#8b4513';
    ctx.fillRect(b.x,b.y,b.width,b.height);
    ctx.fillStyle='#cd853f';
    ctx.fillRect(b.x+5,b.y+5,b.width-10,b.height-10);
}

function shootPlayer(){
    if(!canShoot)return;
    canShoot=false;
    var angle=player.angle;
    bullets.push({x:player.x+12,y:player.y+12,vx:Math.cos(angle)*7,vy:Math.sin(angle)*7,player:true});
    setTimeout(function(){canShoot=true;},200);
}

function start(){
    running=true;
    score=0;
    playerHP=100;
    player.x=100;
    player.y=450;
    player.angle=0;
    enemies=[];
    bullets=[];
    enemyCount=0;
    generateMap();
    canvas.innerHTML='';
    ctx.fillStyle='#000';
    ctx.fillRect(0,0,width,height);
    drawWallsAndBoxes();
    loop();
}

function drawWallsAndBoxes(){
    walls.forEach(function(w){drawWall(w);});
    boxes.forEach(function(b){drawBox(b);});
}

function loop(){
    if(!running)return;
    requestAnimationFrame(loop);

    if(player.x<0||player.x>width-30)player.x=Math.max(0,Math.min(width-30,player.x));
    if(player.y<0||player.y>height-30)player.y=Math.max(0,Math.min(height-30,player.y));

    ctx.save();
    ctx.translate(player.x+15,player.y+15);
    ctx.rotate(player.angle);
    ctx.fillStyle='#4ecdc4';
    ctx.fillRect(-15,-15,30,30);
    ctx.fillStyle='#2d2d2d';
    ctx.fillRect(-18,-15,3,30);
    ctx.fillRect(15,-15,3,30);
    ctx.fillStyle='#444';
    ctx.fillRect(-3,-20,6,20);
    ctx.restore();

    enemies.forEach(function(enemy){
        ctx.save();
        ctx.translate(enemy.x+15,enemy.y+15);
        ctx.rotate(enemy.angle);
        ctx.fillStyle='#e74c3c';
        ctx.fillRect(-15,-15,30,30);
        ctx.restore();
    });

    bullets.forEach(function(b){
        ctx.fillStyle=b.player?'#ffff00':'#ff4444';
        ctx.beginPath();
        ctx.arc(b.x,b.y,5,0,Math.PI*2);
        ctx.fill();
    });

    // 生成敌人
    if(enemyCount<maxEnemies&&Math.random()<0.01){
        enemies.push({x:Math.random()*width,y:-50,angle:Math.random()*Math.PI*2,speed:enemySpeed});
        enemyCount++;
    }

    enemies.forEach(function(enemy){
        enemy.y+=enemy.speed;
        if(enemy.y<50){
            var dx=player.x-enemy.x,dy=player.y-enemy.y,d=Math.sqrt(dx*dx+dy*dy);
            if(d>0){enemy.x+=(dx/d)*1;enemy.y+=(dy/d)*1;}
            enemy.angle=Math.atan2(dy,dx);
        }
        if(enemy.y>=height){
            enemy.dead=true;
            enemyCount--;
        }
    });

    enemies=enemies.filter(function(e){return!e.dead;});

    var now=Date.now();
    if(keyDown['Space']&&now-lastShot>300){
        shootPlayer();
        lastShot=now;
    }

    bullets.forEach(function(b){b.x+=b.vx;b.y+=b.vy;});

    bullets=bullets.filter(function(b){
        if(b.x<0||b.x>width||b.y<0||b.y>height)return false;
        if(b.player){
            enemies.forEach(function(e){
                if(b.x>e.x-8&&b.x<e.x+38&&b.y>e.y-8&&b.y<e.y+38){
                    score+=10;
                    e.hit=true;
                }
            });
            return true;
        }
        if(!b.player){
            if(b.x>player.x+2&&b.x<player.x+28&&b.y>player.y+2&&b.y<player.y+28){
                playerHP-=1;
                if(playerHP<=0){running=false;alert('游戏结束！得分：'+score);}
            }
            return true;
        }
        return true;
    });

    drawWallsAndBoxes();

    document.getElementById('score').innerHTML='得分：'+score;
    document.getElementById('fill').style.width=Math.max(0,playerHP)+'%';
}

canvas.innerHTML='';
ctx.fillStyle='#000';
ctx.fillRect(0,0,width,height);
console.log('游戏加载完成！');
</script>
</body>
</html>
