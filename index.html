<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>坦克大战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            overflow: hidden;
        }

        .game-container {
            display: flex;
            gap: 20px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }

        canvas {
            border: 3px solid #4a4a6a;
            border-radius: 5px;
            background: #000;
        }

        .side-panel {
            width: 220px;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 15px;
            text-align: center;
            text-shadow: 0 0 10px #ff6b6b;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }

        .stat-label {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: #4ecdc4;
        }

        .controls-info {
            margin-top: 20px;
            font-size: 11px;
            color: #888;
            line-height: 1.6;
        }

        .key {
            display: inline-block;
            background: #333;
            padding: 2px 6px;
            border-radius: 3px;
            margin: 0 2px;
            border: 1px solid #555;
        }

        .btn {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(45deg, #f093fb, #f5576c);
            color: white;
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(245, 87, 108, 0.4);
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
            z-index: 1000;
        }

        .game-over.hidden {
            display: none;
        }

        .game-over h2 {
            font-size: 48px;
            color: #ff6b6b;
            text-shadow: 0 0 20px #ff6b6b;
        }

        .game-over p {
            font-size: 24px;
        }

        .health-bar {
            width: 100%;
            height: 10px;
            background: #333;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 5px;
        }

        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #f5576c, #f093fb);
            transition: width 0.3s;
        }

        .score-bar {
            width: 100%;
            height: 10px;
            background: #333;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 5px;
        }

        .score-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ecdc4, #44a08d);
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="side-panel">
            <h1>💥 坦克大战</h1>

            <div class="stat-box">
                <div class="stat-label">生命值</div>
                <div class="stat-value" id="healthText">100%</div>
                <div class="health-bar">
                    <div class="health-fill" id="healthFill" style="width: 100%"></div>
                </div>
            </div>

            <div class="stat-box">
                <div class="stat-label">得分</div>
                <div class="stat-value" id="scoreText">0</div>
                <div class="score-bar">
                    <div class="score-fill" id="scoreFill" style="width: 0%"></div>
                </div>
            </div>

            <div class="stat-box">
                <div class="stat-label">等级</div>
                <div class="stat-value" id="levelText">1</div>
            </div>

            <div class="stat-box">
                <div class="stat-label">击杀</div>
                <div class="stat-value" id="killsText">0</div>
            </div>

            <button class="btn btn-primary" onclick="startGame()">开始游戏</button>
            <button class="btn btn-secondary" onclick="resetGame()">重置游戏</button>

            <div class="controls-info">
                <strong>操作说明：</strong><br>
                <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> 移动<br>
                <span class="key">↑</span> <span class="key">↓</span> 转向<br>
                <span class="key">空格</span> 发射<br>
                <span class="key">P</span> 暂停<br>
                <span class="key">R</span> 重生
            </div>
        </div>
    </div>

    <div class="game-over hidden" id="gameOverScreen">
        <h2>游戏结束</h2>
        <p>最终得分：<span id="finalScore" style="color: #4ecdc4; font-size: 32px;"></span></p>
        <button class="btn btn-primary" onclick="resetGame()">重新开始</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 游戏配置
        const TANK_SIZE = 30;
        const BULLET_SIZE = 5;
        const FPS = 60;

        // 游戏状态
        let gameState = {
            running: false,
            paused: false,
            score: 0,
            health: 100,
            level: 1,
            kills: 0,
            bullets: [],
            enemies: [],
            particles: [],
            walls: [],
            player: null,
            frame: 0
        };

        // 按键状态
        const keys = {};

        // 坦克类
        class Tank {
            constructor(x, y, color, isPlayer) {
                this.x = x;
                this.y = y;
                this.width = TANK_SIZE;
                this.height = TANK_SIZE;
                this.color = color;
                this.isPlayer = isPlayer;
                this.speed = isPlayer ? 3 : 2;
                this.angle = -Math.PI / 2; // 朝上
                this.health = isPlayer ? 100 : 3;
                this.maxHealth = isPlayer ? 100 : 3;
                this.dead = false;
                this.shootCooldown = 0;
                this.maxCooldown = isPlayer ? 15 : 25;
            }

            update() {
                if (this.shootCooldown > 0) {
                    this.shootCooldown--;
                }

                // 边界检查
                this.x = Math.max(0, Math.min(canvas.width - this.width, this.x));
                this.y = Math.max(0, Math.min(canvas.height - this.height, this.y));

                // 墙壁碰撞
                for (const wall of gameState.walls) {
                    if (this.checkWallCollision(wall)) {
                        this.resolveWallCollision(wall);
                    }
                }
            }

            checkWallCollision(wall) {
                return this.x < wall.x + wall.width &&
                       this.x + this.width > wall.x &&
                       this.y < wall.y + wall.height &&
                       this.y + this.height > wall.y;
            }

            resolveWallCollision(wall) {
                // 简单碰撞处理
                const dx = (this.x + this.width / 2) - (wall.x + wall.width / 2);
                const dy = (this.y + this.height / 2) - (wall.y + wall.height / 2);
                if (Math.abs(dx) < wall.width / 2) {
                    this.x -= dx;
                }
                if (Math.abs(dy) < wall.height / 2) {
                    this.y -= dy;
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x + this.width / 2, this.y + this.height / 2);
                ctx.rotate(this.angle);

                // 坦克主体
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.width / 2, -this.height / 2, this.width, this.height);

                // 履带
                ctx.fillStyle = '#2d2d2d';
                ctx.fillRect(-this.width / 2 - 3, -this.height / 2, 3, this.height);
                ctx.fillRect(this.width / 2, -this.height / 2, 3, this.height);

                // 炮塔
                ctx.save();
                ctx.translate(0, -5);
                ctx.fillStyle = adjustColor(this.color, -30);
                ctx.beginPath();
                ctx.arc(0, 0, this.width / 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                // 炮管
                ctx.fillStyle = '#444';
                ctx.fillRect(-2, -this.height / 2 - 5, 4, 10);

                // 玩家标记
                if (this.isPlayer) {
                    ctx.fillStyle = '#4ecdc4';
                    ctx.beginPath();
                    ctx.moveTo(0, -this.width / 4);
                    ctx.lineTo(-5, this.width / 4);
                    ctx.lineTo(5, this.width / 4);
                    ctx.fill();
                }

                ctx.restore();

                // 血量条
                if (this.health < this.maxHealth) {
                    const pct = (this.health / this.maxHealth) * 100;
                    ctx.fillStyle = 'red';
                    ctx.fillRect(this.x, this.y - 10, this.width, 5);
                    ctx.fillStyle = '#4ecdc4';
                    ctx.fillRect(this.x, this.y - 10, this.width * pct / 100, 5);
                }
            }

            move(dx, dy, angle) {
                if (angle) {
                    this.angle = angle;
                } else {
                    this.x += dx * this.speed;
                    this.y += dy * this.speed;
                }
            }

            shoot() {
                if (this.shootCooldown <= 0 && !this.dead) {
                    const angle = Math.atan2(0, Math.cos(this.angle));
                    gameState.bullets.push(new Bullet(
                        this.x + this.width / 2,
                        this.y + this.height / 2,
                        this.angle,
                        this.isPlayer
                    ));
                    this.shootCooldown = this.maxCooldown;
                }
            }
        }

        // 子弹类
        class Bullet {
            constructor(x, y, angle, isPlayer) {
                this.x = x;
                this.y = y;
                this.width = BULLET_SIZE;
                this.height = BULLET_SIZE;
                this.speed = 7;
                this.vx = Math.cos(angle) * this.speed;
                this.vy = Math.sin(angle) * this.speed;
                this.isPlayer = isPlayer;
                this.dead = false;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                // 边界检查
                if (this.x < 0 || this.x > canvas.width ||
                    this.y < 0 || this.y > canvas.height) {
                    this.dead = true;
                }
            }

            draw() {
                ctx.fillStyle = this.isPlayer ? '#ffff00' : '#ff4444';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.width, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // 粒子类（爆炸效果）
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 4 + 2;
                this.speedX = (Math.random() - 0.5) * 4;
                this.speedY = (Math.random() - 0.5) * 4;
                this.life = 1;
                this.decay = Math.random() * 0.02 + 0.02;
                this.color = color;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= this.decay;
            }

            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size);
                ctx.globalAlpha = 1;
            }
        }

        // 生成随机数
        function random(min, max) {
            return Math.random() * (max - min) + min;
        }

        // 调整颜色亮度
        function adjustColor(color, amount) {
            return '#' + color.replace(/^#/, '').replace(/../g, color => ('0x' + color + color + amount).toString(16).slice(-2));
        }

        // 生成地图
        function generateMap() {
            gameState.walls = [];
            const wallCount = 15;

            for (let i = 0; i < wallCount; i++) {
                // 确保不生成在玩家出生点附近
                const x = random(50, canvas.width - 200);
                const y = random(50, canvas.height - 100);
                gameState.walls.push({
                    x: x - random(40, 80),
                    y: y - random(40, 80),
                    width: random(60, 100),
                    height: random(60, 100)
                });
            }

            // 生成箱子（可被摧毁）
            for (let i = 0; i < 8; i++) {
                const x = random(100, canvas.width - 150);
                const y = random(100, canvas.height - 150);
                gameState.walls.push({
                    x: x - random(30, 50),
                    y: y - random(30, 50),
                    width: random(40, 60),
                    height: random(40, 60),
                    isBox: true
                });
            }
        }

        // 生成敌人
        function spawnEnemy() {
            const spawnPoints = [
                {x: canvas.width / 2, y: -50},
                {x: random(0, 100), y: -50},
                {x: canvas.width - 100, y: -50}
            ];

            const spawn = spawnPoints[Math.floor(Math.random() * spawnPoints.length)];
            const enemy = new Tank(spawn.x, spawn.y, '#e74c3c', false);
            enemy.angle = Math.random() < 0.5 ? 0 : Math.PI;
            gameState.enemies.push(enemy);
        }

        // 开始游戏
        function startGame() {
            if (gameState.running) return;

            gameState = {
                running: true,
                paused: false,
                score: 0,
                health: 100,
                level: 1,
                kills: 0,
                bullets: [],
                enemies: [],
                particles: [],
                walls: [],
                player: null,
                frame: 0
            };

            player = new Tank(100, 500, '#4ecdc4', true);
            player.angle = 0;
            gameState.player = player;
            gameState.walls = [];
            gameState.bullets = [];
            gameState.enemies = [];
            gameState.particles = [];

            generateMap();

            document.getElementById('gameOverScreen').classList.add('hidden');
            updateUI();
        }

        // 重置游戏
        function resetGame() {
            startGame();
        }

        // 更新 UI
        function updateUI() {
            document.getElementById('healthText').textContent = Math.ceil(gameState.health) + '%';
            document.getElementById('healthFill').style.width = gameState.health + '%';
            document.getElementById('scoreText').textContent = gameState.score;
            document.getElementById('scoreFill').style.width = Math.min(gameState.score / 1000 * 100, 100) + '%';
            document.getElementById('levelText').textContent = gameState.level;
            document.getElementById('killsText').textContent = gameState.kills;
        }

        // 显示游戏结束
        function showGameOver() {
            gameState.running = false;
            document.getElementById('finalScore').textContent = gameState.score;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }

        // 检查碰撞
        function checkCollisions() {
            // 子弹碰撞
            gameState.bullets.forEach(bullet => {
                if (bullet.dead) return;

                // 玩家子弹击中敌人
                if (bullet.isPlayer) {
                    gameState.enemies.forEach(enemy => {
                        if (!enemy.dead &&
                            bullet.x > enemy.x &&
                            bullet.x < enemy.x + enemy.width &&
                            bullet.y > enemy.y &&
                            bullet.y < enemy.y + enemy.height) {
                            enemy.health -= 1;
                            if (enemy.health <= 0) {
                                enemy.dead = true;
                                gameState.score += 10;
                                gameState.kills++;
                                gameState.level = Math.floor(gameState.score / 100) + 1;
                                createExplosion(enemy.x + enemy.width/2, enemy.y + enemy.height/2, '#e74c3c');
                            } else {
                                createExplosion(bullet.x, bullet.y, '#ffff00');
                            }
                            bullet.dead = true;
                        }
                    });
                }

                // 敌人子弹击中玩家
                if (!bullet.isPlayer) {
                    if (bullet.x > gameState.player.x &&
                        bullet.x < gameState.player.x + gameState.player.width &&
                        bullet.y > gameState.player.y &&
                        bullet.y < gameState.player.y + gameState.player.height) {
                        gameState.player.health -= 1;
                        if (gameState.player.health <= 0) {
                            showGameOver();
                        }
                        bullet.dead = true;
                        createExplosion(bullet.x, bullet.y, '#ff4444');
                    }
                }
            });

            // 清理死去的实体
            gameState.bullets = gameState.bullets.filter(b => !b.dead);
            gameState.enemies = gameState.enemies.filter(e => !e.dead);
            gameState.particles = gameState.particles.filter(p => p.life > 0);
        }

        // 创建爆炸效果
        function createExplosion(x, y, color) {
            for (let i = 0; i < 20; i++) {
                gameState.particles.push(new Particle(x, y, color));
            }
        }

        // 敌人 AI
        function updateEnemies() {
            gameState.enemies.forEach(enemy => {
                const dx = gameState.player.x - enemy.x;
                const dy = gameState.player.y - enemy.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                // 移动到玩家位置
                if (dist > 100) {
                    enemy.move((dx / dist) * 0.5, (dy / dist) * 0.5);
                } else {
                    // 随机转向
                    if (Math.random() < 0.02) {
                        enemy.angle += (Math.random() - 0.5) * Math.PI;
                    }
                }

                // 随机射击
                if (Math.random() < 0.01) {
                    enemy.shoot();
                }
            });
        }

        // 主循环
        function gameLoop() {
            if (!gameState.running || gameState.paused) {
                requestAnimationFrame(gameLoop);
                return;
            }

            gameState.frame++;

            // 更新玩家
            if (gameState.player) {
                gameState.player.update();
                gameState.player.draw();
            }

            // 更新敌人
            updateEnemies();
            gameState.enemies.forEach(enemy => {
                enemy.update();
                enemy.draw();
            });

            // 更新子弹
            gameState.bullets.forEach(bullet => {
                bullet.update();
                bullet.draw();
            });

            // 更新粒子
            gameState.particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            // 碰撞检测
            checkCollisions();

            // 随机生成敌人
            if (gameState.frame % (60 - Math.min(gameState.level * 3, 30)) === 0) {
                spawnEnemy();
            }

            // 更新 UI
            updateUI();

            requestAnimationFrame(gameLoop);
        }

        // 事件监听
        document.addEventListener('keydown', e => {
            keys[e.code] = true;

            // 防止滚动
            if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
                e.preventDefault();
            }

            if (!gameState.player || !gameState.running) return;

            if (e.code === 'KeyW') gameState.player.move(0, -1);
            if (e.code === 'KeyS') gameState.player.move(0, 1);
            if (e.code === 'KeyA') gameState.player.move(-1, 0);
            if (e.code === 'KeyD') gameState.player.move(1, 0);
            if (e.code === 'ArrowUp') gameState.player.move(0, 0, Math.PI * 0.5);
            if (e.code === 'ArrowDown') gameState.player.move(0, 0, -Math.PI * 0.5);
            if (e.code === 'Space') gameState.player.shoot();
            if (e.code === 'KeyP') gameState.paused = !gameState.paused;
            if (e.code === 'KeyR') resetGame();
        });

        document.addEventListener('keyup', e => {
            keys[e.code] = false;
        });

        // 初始绘制
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    </script>
</body>
</html>
